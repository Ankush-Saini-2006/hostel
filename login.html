<!DOCTYPE html>
<html>
<head>
    <title>Student Leave Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 450px;
            margin: 50px auto;
            background: #fff;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Student Leave Form</h2>

    <form>
        <label>Student Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Roll Number</label>
        <input type="text" placeholder="Enter roll number" required>

        <label>Class / Section</label>
        <input type="text" placeholder="Enter class" required>

        <label>Leave Type</label>
        <select required>
            <option value="">Select</option>
            <option>Medical Leave</option>
            <option>Personal Leave</option>
            <option>Emergency Leave</option>
        </select>

        <label>From Date</label>
        <input type="date" required>

        <label>To Date</label>
        <input type="date" required>

        <label>Reason</label>
        <textarea placeholder="Enter reason for leave..." required></textarea>

        <button type="submit">Submit Request</button>
    </form>
</div>

</body>
</html>
